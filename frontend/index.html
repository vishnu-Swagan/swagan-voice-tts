<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swagan Voice TTS</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
            min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
}
    .container {
            max-width: 640px;
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 2.5rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
}
    .logo {
            text-align: center;
      margin-bottom: 2rem;
}
    .logo h1 {
            font-size: 2rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
}
    .logo p {
            color: rgba(255, 255, 255, 0.6);
      font-size: 0.9rem;
    }
    textarea {
            width: 100%;
      min-height: 120px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 1rem;
      color: #fff;
            font-size: 1rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.3s;
}
    textarea:focus {
            border-color: #667eea;
}
    textarea::placeholder { color: rgba(255, 255, 255, 0.3); }
    .controls {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
      align-items: center;
    }
    button {
            flex: 1;
      padding: 0.9rem 1.5rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 12px;
      color: #fff;
            font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
}
    button:hover { transform: translateY(-2px); opacity: 0.9; }
    button:disabled {
            opacity: 0.5;
      cursor: not-allowed;
      transform: none;
}
    .char-count {
            color: rgba(255, 255, 255, 0.4);
      font-size: 0.8rem;
      text-align: right;
      margin-top: 0.3rem;
}
    .status {
            text-align: center;
      margin-top: 1.2rem;
      padding: 0.8rem;
      border-radius: 10px;
      font-size: 0.9rem;
      display: none;
}
    .status.loading {
      display: block;
      background: rgba(102, 126, 234, 0.15);
      color: #667eea;
    }
    .status.error {
      display: block;
      background: rgba(234, 102, 102, 0.15);
      color: #ea6666;
}
    .status.success {
      display: block;
      background: rgba(102, 234, 140, 0.15);
      color: #66ea8c;
}
    .audio-player {
            margin-top: 1.5rem;
      display: none;
      }
    .audio-player.visible { display: block; }
    audio {
            width: 100%;
      border-radius: 12px;
}
    .settings {
            margin-top: 1rem;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
}
    .settings label {
      display: block;
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.85rem;
      margin-bottom: 0.3rem;
      }
    .settings input {
            width: 100%;
      padding: 0.6rem;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      color: #fff;
      font-size: 0.9rem;
            outline: none;
    }
    .settings input:focus { border-color: #667eea; }
    footer {
            margin-top: 2rem;
      text-align: center;
      color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
}
  </style>
</head>
<body>
      <div class="container">
    <div class="logo">
      <h1>Swagan Voice TTS</h1>
          <p>AI-Powered Text-to-Speech</p>
        </div>

        <div class="settings">
          <label for="apiUrl">API Server URL</label>
          <input type="text" id="apiUrl" placeholder="https://your-railway-app.up.railway.app" />
        </div>

        <textarea id="textInput" placeholder="Enter text to convert to speech..." maxlength="5000"></textarea>
        <div class="char-count"><span id="charCount">0</span> / 5000</div>

        <div class="controls">
          <button id="synthesizeBtn" onclick="synthesize()">Synthesize Speech</button>
        </div>

        <div id="status" class="status"></div>

        <div id="audioPlayer" class="audio-player">
          <audio id="audio" controls></audio>
        </div>
      </div>

      <footer>
        Swagan Voice TTS &mdash; Powered by Coqui TTS Engine
  </footer>

  <script>
    const textInput = document.getElementById('textInput');
    const charCount = document.getElementById('charCount');
    const statusEl = document.getElementById('status');
    const audioPlayer = document.getElementById('audioPlayer');
    const audioEl = document.getElementById('audio');
    const synthesizeBtn = document.getElementById('synthesizeBtn');
    const apiUrlInput = document.getElementById('apiUrl');

    // Load saved API URL
    const savedUrl = localStorage.getItem('swagan_api_url');
    if (savedUrl) apiUrlInput.value = savedUrl;

    textInput.addEventListener('input', () => {
            charCount.textContent = textInput.value.length;
});

    apiUrlInput.addEventListener('change', () => {
            localStorage.setItem('swagan_api_url', apiUrlInput.value);
});

    function setStatus(message, type) {
            statusEl.textContent = message;
      statusEl.className = 'status ' + type;
    }

    async function synthesize() {
      const text = textInput.value.trim();
      const apiUrl = apiUrlInput.value.trim();

      if (!apiUrl) {
        setStatus('Please enter your API server URL first.', 'error');
        return;
      }
      if (!text) {
        setStatus('Please enter some text.', 'error');
        return;
      }

      synthesizeBtn.disabled = true;
      setStatus('Generating speech... This may take a moment.', 'loading');
      audioPlayer.classList.remove('visible');

      try {
        const url = apiUrl.replace(/\/$/, '') + '/api/tts?text=' + encodeURIComponent(text);
        const response = await fetch(url);

        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(err.error || 'Server error: ' + response.status);
        }

        const blob = await response.blob();
        const audioUrl = URL.createObjectURL(blob);
        audioEl.src = audioUrl;
        audioPlayer.classList.add('visible');
        setStatus('Speech generated successfully!', 'success');
      } catch (err) {
        setStatus('Error: ' + err.message, 'error');
      } finally {
        synthesizeBtn.disabled = false;
    }
}

    // Allow Ctrl+Enter to synthesize
    textInput.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
              synthesize();
    }
});
  </script>
    </body>
    </html>
